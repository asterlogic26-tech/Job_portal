name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}      # Oracle public IP
          username: ${{ secrets.SERVER_USER }}  # ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}    # contents of your .pem / private key file
          port: 22
          script_stop: true
          script: |
            export APP_DIR=/opt/personal-job-agent
            export DEPLOY_BRANCH=main
            cd $APP_DIR
            bash deploy/deploy.sh 2>&1 | tee /tmp/deploy.log
            echo "Deploy exit code: $?"
