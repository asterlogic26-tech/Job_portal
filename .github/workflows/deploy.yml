name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script_stop: true
          script: |
            export APP_DIR=/opt/personal-job-agent
            export DEPLOY_BRANCH=main
            bash $APP_DIR/deploy/deploy.sh 2>&1 | tee /tmp/deploy.log
            echo "Exit code: $?"
