events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    # ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name networknimble.info www.networknimble.info;

        # Let's Encrypt webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Nginx self-health (used by Docker healthcheck)
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name networknimble.info www.networknimble.info;
        client_max_body_size 20M;

        ssl_certificate     /etc/letsencrypt/live/networknimble.info/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/networknimble.info/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API routes → backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # WebSocket → backend
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Everything else → frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
