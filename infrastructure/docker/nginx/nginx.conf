events {
    worker_connections 1024;
}

http {
    # Docker internal DNS — resolves service names lazily (not at startup)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name networknimble.info www.networknimble.info;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name networknimble.info www.networknimble.info;
        client_max_body_size 20M;

        ssl_certificate     /etc/letsencrypt/live/networknimble.info/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/networknimble.info/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # API routes → backend (lazy DNS via variable)
        location /api/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # WebSocket → backend
        location /ws/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Frontend
        location / {
            set $frontend http://frontend:5173;
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
