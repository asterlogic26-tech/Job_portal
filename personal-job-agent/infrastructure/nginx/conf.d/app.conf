# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────────
server {
    listen 80;
    server_name networknimble.info www.networknimble.info;

    # Let's Encrypt domain ownership verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://networknimble.info$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name networknimble.info www.networknimble.info;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/networknimble.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/networknimble.info/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # ── Backend API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── API docs (Swagger / ReDoc) ─────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Flower (Celery monitor) — basic-auth protected ─────────────────────────
    location /flower/ {
        proxy_pass         http://flower:5555/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Flower handles its own basic-auth via FLOWER_USER/FLOWER_PASSWORD env vars
    }

    # ── Frontend (React SPA) ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
