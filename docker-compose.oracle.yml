# ============================================================
# Oracle Cloud Ampere A1 — performance overrides
# 4 OCPU ARM64 · 24 GB RAM · Always Free
#
# Usage (all three files together):
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     -f docker-compose.oracle.yml \
#     up -d
#
# What this file does vs docker-compose.prod.yml:
#   - Declares platform: linux/arm64 on every service
#   - Tunes PostgreSQL to use 6 GB of the available 24 GB
#   - Sets Redis maxmemory = 2 GB
#   - Increases Celery concurrency to 4 (one per OCPU)
#   - Increases uvicorn to 4 workers
#   - Caches the sentence-transformers model in a named volume
#     so it is NOT re-downloaded on every container restart
# ============================================================

version: "3.9"

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    platform: linux/arm64
    # Tune for 24 GB host — allocate ~6 GB to Postgres
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c maintenance_work_mem=512MB
      -c work_mem=32MB
      -c wal_buffers=64MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_connections=100
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c default_statistics_target=100
      -c log_min_duration_statement=1000

  redis:
    platform: linux/arm64
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --tcp-keepalive 300

  qdrant:
    platform: linux/arm64

  minio:
    platform: linux/arm64

  # ── Application ──────────────────────────────────────────────────────────────

  backend:
    platform: linux/arm64
    # 4 uvicorn workers — one per OCPU
    command: >
      sh -c "alembic -c backend/alembic.ini upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    platform: linux/arm64
    # Use all 4 ARM OCPUs
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q default,discovery,matching,radar,notifications,content
    volumes:
      # Cache sentence-transformers model — avoids ~90 MB re-download on restart
      - model_cache:/root/.cache

  celery-beat:
    platform: linux/arm64

  flower:
    platform: linux/arm64

  # ── Proxy ────────────────────────────────────────────────────────────────────

  nginx:
    platform: linux/arm64

  certbot:
    platform: linux/arm64

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    platform: linux/arm64
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # Pass ARM platform to the multi-stage build
      args:
        BUILDPLATFORM: linux/arm64
        TARGETPLATFORM: linux/arm64

volumes:
  # Persists the downloaded sentence-transformers / HuggingFace model
  # so containers restart in seconds rather than re-downloading
  model_cache:
